<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring 关卡布局编辑器</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; }
    .app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
    .panel { padding: 12px; border-right: 1px solid #333; overflow: auto; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .row > * { flex: 1; }
    input, select, button, textarea { background: #1f1f1f; color: #eee; border: 1px solid #444; padding: 6px; border-radius: 4px; }
    button { cursor: pointer; }
    .ring-item { border: 1px solid #333; border-radius: 6px; padding: 8px; margin-bottom: 8px; }
    .warn { color: #ff7676; }
    .ok { color: #79e37d; }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: 100%; display: block; background: #181818; }
    .hint { position: absolute; left: 8px; bottom: 8px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px; font-size: 12px; }
    .canvas-hint { position: absolute; left: 8px; top: 8px; background: rgba(0,40,80,0.75); padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #9cf; max-width: min(420px, 90%); line-height: 1.4; pointer-events: none; display: none; }
    .canvas-hint.visible { display: block; }
    h3 { margin: 12px 0 8px; }
    .small { font-size: 12px; color: #bbb; }
    .entity-item { border: 1px solid #333; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>Ring 关卡布局编辑器</h2>
      <div class="small">拖拽右侧圆环调整位置，自动检查重叠。导出可直接粘贴到 `Repo.ts`。</div>

      <h3>关卡信息</h3>
      <div class="row">
        <label>关卡号</label>
        <input id="levelId" type="number" value="1" min="1" />
      </div>
      <div class="row">
        <label>名称</label>
        <input id="levelName" type="text" value="Level 1" />
      </div>

      <h3>全局参数</h3>
      <div class="small">GapSize 固定为 45（与运行时一致）</div>

      <div class="row">
        <button id="addRingBtn">新增 Ring</button>
        <button id="autoSpreadBtn">自动拉开</button>
      </div>

      <div id="overlapStatus" class="warn">重叠检查中...</div>

      <h3>Rings</h3>
      <div id="ringList"></div>

      <h3>岩石</h3>
      <div class="row">
        <select id="rockRingSelect"></select>
        <button id="addRockBtn">新增 Rock</button>
      </div>
      <div id="rockList"></div>

      <h3>炸弹</h3>
      <div class="row">
        <select id="bombRingSelect"></select>
        <input id="bombCountdownInput" type="number" min="1" value="30" title="默认倒计时（秒）" />
        <button id="addBombBtn">新增 Bomb</button>
      </div>
      <div id="bombList"></div>

      <h3>导出</h3>
      <div class="row">
        <button id="exportRepoBtn">导出 Repo（自动复制）</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="stage"></canvas>
      <div id="canvasHint" class="canvas-hint" aria-live="polite"></div>
      <div class="hint">
        左键点选 / 拖拽移动 | 中键拖拽旋转 Angle | 红色表示与其他 Ring 重叠<br/>
        Angle：0°=缺口朝上（逆时针为正）；导出字段为 `angle`（与 Ring.prefab 默认朝向一致）。槽位：`buckle1=-90` … `buckle5=90`
      </div>
    </div>
  </div>

  <script>
    // 与 Ring.prefab 中 Buckles/Buckle1..5 的朝向定义一致（按节点名映射）
    const SLOT_ANGLE = { buckle1: -90, buckle2: -45, buckle3: 0, buckle4: 45, buckle5: 90 };
    // 与项目运行时保持一致：
    // Ring.prefab 基准半径 180，运行时缩放 0.5 -> 实际布局/判定半径 90
    const RING_PREFAB_BASE_RADIUS = 180;
    const RING_SCALE = 0.5;
    // 编辑器 angle：0°=缺口朝上（世界角逆时针）；导出 angle 与 Runtime 根节点 Z 旋转一一对应（不做额外偏移）
    // Ring.prefab 中 Buckles/Buckle1..5 的局部坐标（以 Ring 根节点为参考）
    const BUCKLE_LOCAL_POS = {
      buckle1: { x: -250, y: 0 },
      buckle2: { x: -170, y: -170 },
      buckle3: { x: 0, y: -240 },
      buckle4: { x: 170, y: -170 },
      buckle5: { x: 250, y: 0 },
    };
    // 与 Runtime.ringCenterOffsetX/Y 一致：配置坐标到可视中心的偏移
    const RING_CENTER_OFFSET = { x: 0, y: 20 };
    const SLOT_KEYS = Object.keys(SLOT_ANGLE);
    // 普通环颜色池（排除红色），红色仅用于重叠警示
    const RING_COLORS = ["#4ecdc4", "#5b8cff", "#b06bff", "#ffd166", "#3ddc97", "#7bdff2", "#8bc34a"];
    const RING_STROKE_WIDTH = 24;

    const state = {
      rings: [
        { id: "ring1", position: { x: -140, y: 0 }, angle: 0, buckles: [] },
        { id: "ring2", position: { x: 0, y: 0 }, angle: 0, buckles: [] },
        { id: "ring3", position: { x: 140, y: 0 }, angle: 0, buckles: [] },
      ],
      rocks: [],
      bombs: [],
      dragRingId: null,
      dragOffset: { x: 0, y: 0 },
      selectedRingId: null,
      /** @type {{ ringId: string, lastWorld: { x: number, y: number } } | null} */
      midRotateState: null,
    };

    const el = {
      levelId: document.getElementById("levelId"),
      levelName: document.getElementById("levelName"),
      addRingBtn: document.getElementById("addRingBtn"),
      autoSpreadBtn: document.getElementById("autoSpreadBtn"),
      overlapStatus: document.getElementById("overlapStatus"),
      ringList: document.getElementById("ringList"),
      rockRingSelect: document.getElementById("rockRingSelect"),
      addRockBtn: document.getElementById("addRockBtn"),
      rockList: document.getElementById("rockList"),
      bombRingSelect: document.getElementById("bombRingSelect"),
      bombCountdownInput: document.getElementById("bombCountdownInput"),
      addBombBtn: document.getElementById("addBombBtn"),
      bombList: document.getElementById("bombList"),
      exportRepoBtn: document.getElementById("exportRepoBtn"),
      stage: document.getElementById("stage"),
      canvasHint: document.getElementById("canvasHint"),
    };

    const ctx = el.stage.getContext("2d");
    const FIXED_GAP_SIZE = 45;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = el.stage.getBoundingClientRect();
      el.stage.width = Math.floor(rect.width * dpr);
      el.stage.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }
    window.addEventListener("resize", resizeCanvas);

    function worldToCanvas(p) {
      const rect = el.stage.getBoundingClientRect();
      return { x: rect.width * 0.5 + p.x, y: rect.height * 0.5 - p.y };
    }
    function canvasToWorld(p) {
      const rect = el.stage.getBoundingClientRect();
      return { x: p.x - rect.width * 0.5, y: -(p.y - rect.height * 0.5) };
    }

    function getRadius() {
      return RING_PREFAB_BASE_RADIUS * RING_SCALE;
    }
    resizeCanvas();

    function normalize(a) {
      const m = a % 360;
      return m < 0 ? m + 360 : m;
    }

    function overlaps(r1, r2) {
      const c1 = getRenderCenter(r1);
      const c2 = getRenderCenter(r2);
      const dx = c1.x - c2.x;
      const dy = c1.y - c2.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      // 任意两个环边缘接触或相交都视为错误重叠
      return d <= getRadius() * 2;
    }

    function getRenderCenter(ring) {
      // 配置坐标 + Ring 圆心偏移 = 实际可视/判定圆心
      return {
        x: ring.position.x + RING_CENTER_OFFSET.x,
        y: ring.position.y + RING_CENTER_OFFSET.y,
      };
    }

    function overlapPairs() {
      const arr = [];
      for (let i = 0; i < state.rings.length; i++) {
        for (let j = i + 1; j < state.rings.length; j++) {
          if (overlaps(state.rings[i], state.rings[j])) arr.push([state.rings[i].id, state.rings[j].id]);
        }
      }
      return arr;
    }

    /** 从环心指向两点的方向角差（度），逆时针为正（世界 y 向上） */
    function pointerAngleDeltaFromCenter(center, prevWorld, currWorld) {
      const v1 = { x: prevWorld.x - center.x, y: prevWorld.y - center.y };
      const v2 = { x: currWorld.x - center.x, y: currWorld.y - center.y };
      const len1 = Math.hypot(v1.x, v1.y);
      const len2 = Math.hypot(v2.x, v2.y);
      if (len1 < 1e-6 || len2 < 1e-6) return 0;
      const n1 = { x: v1.x / len1, y: v1.y / len1 };
      const n2 = { x: v2.x / len2, y: v2.y / len2 };
      const dot = n1.x * n2.x + n1.y * n2.y;
      const cross = n1.x * n2.y - n1.y * n2.x;
      let ang = Math.acos(Math.max(-1, Math.min(1, dot))) * (180 / Math.PI);
      if (cross < 0) ang = -ang;
      return ang;
    }

    function drawRing(r, color, isOverlap, isSelected) {
      const c = worldToCanvas(getRenderCenter(r));
      // 视觉 ring 仅向内吃线宽，外边界与实际判定半径对齐（border-box）
      const outerRadius = getRadius();
      const rad = Math.max(1, outerRadius - RING_STROKE_WIDTH * 0.5);
      const gapSize = FIXED_GAP_SIZE;
      // 缺口中心方向（世界 y 轴向上、从 +X 逆时针）：编辑器 angle=0 → 90°=朝上
      const gapMid = normalize(r.angle + 90);
      // Canvas arc 角沿顺时针递增；世界坐标（与 Buckle / Rules 一致）为 y 向上、逆时针为正 → 映射为取负。
      // 取负后若仍用 clockwise，会画成短弧（缺口）；须 anticlockwise 才能画原先那道大弧（环身）。
      const a1 = ((gapMid + gapSize / 2) * Math.PI) / 180;
      const a2 = ((gapMid - gapSize / 2) * Math.PI) / 180;
      const start = -a1;
      const end = -a2;

      ctx.lineWidth = RING_STROKE_WIDTH;
      ctx.strokeStyle = isOverlap ? "#ff5f5f" : color;
      ctx.beginPath();
      ctx.arc(c.x, c.y, rad, start, end, true);
      ctx.stroke();

      if (isSelected) {
        ctx.save();
        ctx.setLineDash([6, 6]);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(120, 200, 255, 0.95)";
        ctx.beginPath();
        ctx.arc(c.x, c.y, rad + 18, 0, Math.PI * 2, false);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = "#ddd";
      ctx.font = "12px Arial";
      ctx.fillText(r.id, c.x - 16, c.y + 4);

      // draw active buckles (position + size + rotation) to match prefab behavior
      for (const b of r.buckles) {
        const wp = getBuckleWorldPoint(r, b.id);
        const p = worldToCanvas(wp);
        const rz = b.angle + r.angle;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((-rz * Math.PI) / 180); // world y-up -> canvas y-down
        ctx.fillStyle = "#f2f2f2";
        ctx.strokeStyle = "#222";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.rect(
          -BUCKLE_RENDER_SIZE.w * 0.5,
          -BUCKLE_RENDER_SIZE.h * 0.5,
          BUCKLE_RENDER_SIZE.w,
          BUCKLE_RENDER_SIZE.h
        );
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function render() {
      const rect = el.stage.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      ctx.strokeStyle = "#2a2a2a";
      ctx.beginPath();
      ctx.moveTo(0, rect.height * 0.5);
      ctx.lineTo(rect.width, rect.height * 0.5);
      ctx.moveTo(rect.width * 0.5, 0);
      ctx.lineTo(rect.width * 0.5, rect.height);
      ctx.stroke();

      const pairs = overlapPairs();
      const overlapSet = new Set(pairs.flat());
      state.rings.forEach((r, i) => {
        const color = RING_COLORS[i % RING_COLORS.length];
        drawRing(r, color, overlapSet.has(r.id), r.id === state.selectedRingId);
      });
      drawEntities();

      updateCanvasInteractionHint();

      if (pairs.length > 0) {
        el.overlapStatus.className = "warn";
        el.overlapStatus.textContent = `存在重叠: ${pairs.map(p => `${p[0]}<->${p[1]}`).join(" , ")}`;
      } else {
        el.overlapStatus.className = "ok";
        el.overlapStatus.textContent = "无重叠";
      }
    }

    function drawEntities() {
      for (const rock of state.rocks) {
        const ring = state.rings.find((x) => x.id === rock.ringId);
        if (!ring) {
          throw new Error(`Rock 绑定 ring 不存在: ${rock.ringId}`);
        }
        const c = worldToCanvas(getRenderCenter(ring));
        ctx.fillStyle = "#a0a0a0";
        ctx.fillRect(c.x - 8, c.y - 8, 16, 16);
        ctx.strokeStyle = "#1a1a1a";
        ctx.strokeRect(c.x - 8, c.y - 8, 16, 16);
        ctx.fillStyle = "#101010";
        ctx.font = "10px Arial";
        ctx.fillText("R", c.x - 3, c.y + 3);
      }

      for (const bomb of state.bombs) {
        const ring = state.rings.find((x) => x.id === bomb.ringId);
        if (!ring) {
          throw new Error(`Bomb 绑定 ring 不存在: ${bomb.ringId}`);
        }
        const c = worldToCanvas(getRenderCenter(ring));
        ctx.fillStyle = "#ff5f5f";
        ctx.beginPath();
        ctx.arc(c.x + 16, c.y - 16, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#3a0f0f";
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.font = "9px Arial";
        ctx.fillText("B", c.x + 13, c.y - 13);
      }
    }

    function updateCanvasInteractionHint() {
      const box = el.canvasHint;
      const sid = state.selectedRingId;
      const ring = sid ? state.rings.find(x => x.id === sid) : null;
      if (state.midRotateState && ring) {
        box.textContent = `旋转中 · ${ring.id} · Angle ${Math.round(ring.angle)}°（中键拖拽，松手结束）`;
        box.className = "canvas-hint visible";
        return;
      }
      if (state.dragRingId && ring && state.dragRingId === sid) {
        box.textContent = `移动中 · ${ring.id}（左键拖拽）`;
        box.className = "canvas-hint visible";
        return;
      }
      if (sid && ring) {
        box.textContent = `已选中 ${ring.id} · 左键拖拽移动 · 中键拖拽旋转 Angle`;
        box.className = "canvas-hint visible";
        return;
      }
      box.textContent = "";
      box.className = "canvas-hint";
    }

    function makeRingEditor(r) {
      const box = document.createElement("div");
      box.className = "ring-item";
      box.innerHTML = `
        <div class="row">
          <strong>${r.id}</strong>
          <button data-act="del">删除</button>
        </div>
        <div class="row"><label>X</label><input data-k="x" type="number" value="${r.position.x}"></div>
        <div class="row"><label>Y</label><input data-k="y" type="number" value="${r.position.y}"></div>
        <div class="row"><label>Angle</label><input data-k="angle" type="number" value="${r.angle}" title="0=缺口朝上，逆时针为正；导出为 angle"></div>
        <div class="small">Buckle（只选择参与判定的槽位，关联 Ring 自动推导）</div>
        <div class="row">
          <select data-k="slot">
            ${SLOT_KEYS.map(k => `<option value="${k}">${k} (${SLOT_ANGLE[k]}°)</option>`).join("")}
          </select>
          <button data-act="addBuckle">添加</button>
        </div>
        <div data-k="buckleList"></div>
      `;

      box.querySelector('[data-k="x"]').addEventListener("input", e => { r.position.x = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-k="y"]').addEventListener("input", e => { r.position.y = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-k="angle"]').addEventListener("input", e => { r.angle = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-act="del"]').addEventListener("click", () => {
        if (state.selectedRingId === r.id) state.selectedRingId = null;
        state.rings = state.rings.filter(x => x.id !== r.id);
        state.rocks = state.rocks.filter(x => x.ringId !== r.id);
        state.bombs = state.bombs.filter(x => x.ringId !== r.id);
        refreshEditors();
        render();
      });
      box.querySelector('[data-act="addBuckle"]').addEventListener("click", () => {
        const slot = box.querySelector('[data-k="slot"]').value;
        const exists = r.buckles.find(b => b.id === slot);
        if (exists) {
          // already selected, keep as-is
        } else {
          r.buckles.push({ id: slot, angle: SLOT_ANGLE[slot] });
        }
        refreshEditors();
      });

      const buckleList = box.querySelector('[data-k="buckleList"]');
      r.buckles.forEach((b, idx) => {
        const item = document.createElement("div");
        item.className = "row";
        item.innerHTML = `
          <span>${b.id} (${b.angle}°)</span>
          <button data-rm="${idx}">移除</button>
        `;
        item.querySelector("button").addEventListener("click", () => {
          r.buckles.splice(idx, 1);
          refreshEditors();
        });
        buckleList.appendChild(item);
      });

      return box;
    }

    // Buckle prefab 视觉尺寸约 104x127，运行时 Ring 使用 0.5 缩放后近似尺寸：
    const BUCKLE_RENDER_SIZE = { w: 52, h: 63.5 };

    function rotateYUp(v, deg) {
      const rad = (deg * Math.PI) / 180;
      const c = Math.cos(rad);
      const s = Math.sin(rad);
      return { x: v.x * c - v.y * s, y: v.x * s + v.y * c };
    }

    function getBuckleWorldPoint(ring, slotId) {
      const center = getRenderCenter(ring);
      const lp = BUCKLE_LOCAL_POS[slotId];
      if (!lp) return { x: center.x, y: center.y };
      const scaled = { x: lp.x * RING_SCALE, y: lp.y * RING_SCALE };
      const w = rotateYUp(scaled, ring.angle);
      return { x: center.x + w.x, y: center.y + w.y };
    }

    function inferLinkedRingId(sourceRing, slotId) {
      const p = getBuckleWorldPoint(sourceRing, slotId);
      const radius = getRadius();
      let bestId = undefined;
      let bestErr = Number.POSITIVE_INFINITY;

      for (const target of state.rings) {
        if (target.id === sourceRing.id) continue;
        const c = getRenderCenter(target);
        const d = Math.hypot(p.x - c.x, p.y - c.y);
        const err = Math.abs(d - radius);
        if (err < bestErr) {
          bestErr = err;
          bestId = target.id;
        }
      }

      // 容差：离目标环边缘过远则不建立关联
      return bestErr <= 24 ? bestId : undefined;
    }

    function refreshEditors() {
      el.ringList.innerHTML = "";
      state.rings.forEach(r => el.ringList.appendChild(makeRingEditor(r)));
      refreshEntityEditors();
      render();
    }

    function ringOptionsHtml() {
      return state.rings.map((r) => `<option value="${r.id}">${r.id}</option>`).join("");
    }

    function refreshEntityEditors() {
      const options = ringOptionsHtml();
      el.rockRingSelect.innerHTML = options;
      el.bombRingSelect.innerHTML = options;

      el.rockList.innerHTML = "";
      state.rocks.forEach((rock, idx) => {
        const item = document.createElement("div");
        item.className = "entity-item";
        item.innerHTML = `
          <div class="row">
            <span>${rock.id} -> ${rock.ringId}</span>
            <button data-rm="${idx}">删除</button>
          </div>
        `;
        item.querySelector("button").addEventListener("click", () => {
          state.rocks.splice(idx, 1);
          refreshEditors();
        });
        el.rockList.appendChild(item);
      });

      el.bombList.innerHTML = "";
      state.bombs.forEach((bomb, idx) => {
        const item = document.createElement("div");
        item.className = "entity-item";
        item.innerHTML = `
          <div class="row">
            <span>${bomb.id} -> ${bomb.ringId}</span>
            <button data-rm="${idx}">删除</button>
          </div>
          <div class="row">
            <label>Countdown</label>
            <input data-k="countdown" type="number" min="1" value="${bomb.countdown ?? 30}" />
          </div>
        `;
        item.querySelector("button").addEventListener("click", () => {
          state.bombs.splice(idx, 1);
          refreshEditors();
        });
        item.querySelector('[data-k="countdown"]').addEventListener("input", (e) => {
          bomb.countdown = Number(e.target.value);
          render();
        });
        el.bombList.appendChild(item);
      });
    }

    function exportConfigObject() {
      for (const rock of state.rocks) {
        if (!state.rings.find((x) => x.id === rock.ringId)) {
          throw new Error(`导出失败：Rock 绑定 ring 不存在: ${rock.ringId}`);
        }
      }
      for (const bomb of state.bombs) {
        if (!state.rings.find((x) => x.id === bomb.ringId)) {
          throw new Error(`导出失败：Bomb 绑定 ring 不存在: ${bomb.ringId}`);
        }
      }

      const exportedBuckles = [];
      for (const r of state.rings) {
        for (const b of r.buckles) {
          const linkedRingId = inferLinkedRingId(r, b.id);
          exportedBuckles.push({
            id: b.id,
            ringId: r.id,
            angle: b.angle,
            ...(linkedRingId ? { linkedRingId } : {})
          });
        }
      }
      return {
        id: Number(el.levelId.value) || 1,
        name: el.levelName.value || `Level ${el.levelId.value || 1}`,
        rings: state.rings.map(r => ({
          id: r.id,
          position: { x: Math.round(r.position.x), y: Math.round(r.position.y) },
          angle: Math.round(r.angle)
        })),
        buckles: exportedBuckles,
        rocks: state.rocks,
        bombs: state.bombs,
      };
    }

    function guardExportWhenOverlap() {
      const pairs = overlapPairs();
      if (pairs.length === 0) return true;
      alert(`导出失败：存在环重叠（含边缘接触）\n${pairs.map(p => `${p[0]} <-> ${p[1]}`).join("\n")}`);
      return false;
    }

    function exportRepoSnippet() {
      const cfg = exportConfigObject();
      return `return ${JSON.stringify(cfg, null, 2)};`;
    }

    function copyTextFallback(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "readonly");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      if (!ok) throw new Error("浏览器拒绝复制");
    }

    function autoSpread() {
      const r = getRadius();
      const n = Math.max(state.rings.length, 1);
      const R = Math.max(180, r * 1.8);
      state.rings.forEach((ring, i) => {
        const a = (i / n) * Math.PI * 2;
        ring.position.x = Math.round(Math.cos(a) * R);
        ring.position.y = Math.round(Math.sin(a) * R);
      });
      refreshEditors();
    }

    el.addRingBtn.addEventListener("click", () => {
      const idx = state.rings.length + 1;
      state.rings.push({
        id: `ring${idx}`,
        position: { x: idx * 40, y: 0 },
        angle: 0,
        buckles: []
      });
      refreshEditors();
    });
    el.autoSpreadBtn.addEventListener("click", autoSpread);

    el.addRockBtn.addEventListener("click", () => {
      const ringId = el.rockRingSelect.value;
      if (!state.rings.find((x) => x.id === ringId)) {
        throw new Error(`新增 Rock 失败：ring 不存在: ${ringId}`);
      }
      if (state.rocks.find((x) => x.ringId === ringId)) {
        throw new Error(`新增 Rock 失败：ring 已有 Rock: ${ringId}`);
      }
      const id = `rock${state.rocks.length + 1}`;
      state.rocks.push({ id, ringId });
      refreshEditors();
    });

    el.addBombBtn.addEventListener("click", () => {
      const ringId = el.bombRingSelect.value;
      if (!state.rings.find((x) => x.id === ringId)) {
        throw new Error(`新增 Bomb 失败：ring 不存在: ${ringId}`);
      }
      if (state.bombs.find((x) => x.ringId === ringId)) {
        throw new Error(`新增 Bomb 失败：ring 已有 Bomb: ${ringId}`);
      }
      const countdown = Number(el.bombCountdownInput.value);
      if (!Number.isFinite(countdown) || countdown <= 0) {
        throw new Error(`新增 Bomb 失败：countdown 非法: ${el.bombCountdownInput.value}`);
      }
      const id = `bomb${state.bombs.length + 1}`;
      state.bombs.push({ id, ringId, countdown: Math.round(countdown) });
      refreshEditors();
    });

    el.exportRepoBtn.addEventListener("click", async () => {
      if (!guardExportWhenOverlap()) return;
      const text = exportRepoSnippet();
      try {
        if (location.protocol === "file:") {
          copyTextFallback(text);
        } else if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          copyTextFallback(text);
        }
      } catch (err) {
        alert(`复制失败: ${err?.message || String(err)}`);
        return;
      }
      alert("已复制 Repo 片段到剪贴板");
    });

    function pickRingAtWorld(p) {
      const rad = getRadius();
      for (let i = state.rings.length - 1; i >= 0; i--) {
        const ring = state.rings[i];
        const center = getRenderCenter(ring);
        const dx = p.x - center.x;
        const dy = p.y - center.y;
        if (Math.hypot(dx, dy) <= rad) return ring;
      }
      return null;
    }

    el.stage.addEventListener("mousedown", (e) => {
      const rect = el.stage.getBoundingClientRect();
      const p = canvasToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });

      if (e.button === 1) {
        e.preventDefault();
        const ring = pickRingAtWorld(p);
        if (!ring) return;
        state.selectedRingId = ring.id;
        const center = getRenderCenter(ring);
        state.midRotateState = {
          ringId: ring.id,
          lastWorld: { x: p.x, y: p.y },
        };
        render();
        return;
      }

      if (e.button !== 0) return;

      const ring = pickRingAtWorld(p);
      if (!ring) {
        state.selectedRingId = null;
        render();
        return;
      }

      state.selectedRingId = ring.id;
      const center = getRenderCenter(ring);
      state.dragRingId = ring.id;
      state.dragOffset.x = center.x - p.x;
      state.dragOffset.y = center.y - p.y;
      render();
    });

    el.stage.addEventListener("auxclick", (e) => {
      if (e.button === 1) e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      const rect = el.stage.getBoundingClientRect();
      const p = canvasToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });

      if (state.midRotateState) {
        const ring = state.rings.find(x => x.id === state.midRotateState.ringId);
        if (!ring) {
          state.midRotateState = null;
          render();
          return;
        }
        const center = getRenderCenter(ring);
        const d = pointerAngleDeltaFromCenter(center, state.midRotateState.lastWorld, p);
        ring.angle = ring.angle + d;
        state.midRotateState.lastWorld = { x: p.x, y: p.y };
        refreshEditors();
        return;
      }

      if (!state.dragRingId) return;
      const ring = state.rings.find(x => x.id === state.dragRingId);
      if (!ring) return;
      const newCenterX = p.x + state.dragOffset.x;
      const newCenterY = p.y + state.dragOffset.y;
      ring.position.x = Math.round(newCenterX - RING_CENTER_OFFSET.x);
      ring.position.y = Math.round(newCenterY - RING_CENTER_OFFSET.y);
      refreshEditors();
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button === 1 && state.midRotateState) {
        state.midRotateState = null;
        render();
      }
      if (e.button === 0) {
        state.dragRingId = null;
        render();
      }
    });

    refreshEditors();
  </script>
</body>
</html>
