<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring 关卡布局编辑器</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; }
    .app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
    .panel { padding: 12px; border-right: 1px solid #333; overflow: auto; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .row > * { flex: 1; }
    input, select, button, textarea { background: #1f1f1f; color: #eee; border: 1px solid #444; padding: 6px; border-radius: 4px; }
    button { cursor: pointer; }
    .ring-item { border: 1px solid #333; border-radius: 6px; padding: 8px; margin-bottom: 8px; }
    .warn { color: #ff7676; }
    .ok { color: #79e37d; }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: 100%; display: block; background: #181818; }
    .hint { position: absolute; left: 8px; bottom: 8px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px; font-size: 12px; }
    .canvas-hint { position: absolute; left: 8px; top: 8px; background: rgba(0,40,80,0.75); padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #9cf; max-width: min(420px, 90%); line-height: 1.4; pointer-events: none; display: none; }
    .canvas-hint.visible { display: block; }
    h3 { margin: 12px 0 8px; }
    .small { font-size: 12px; color: #bbb; }
    .entity-item { border: 1px solid #333; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h2>Ring 关卡布局编辑器</h2>
      <div class="small">拖拽右侧圆环调整位置，自动检查重叠。导出可直接粘贴到 `LevelConfig.ts`。</div>

      <h3>关卡信息</h3>
      <div class="row">
        <label>关卡号</label>
        <input id="levelId" type="number" value="1" min="1" />
      </div>
      <div class="row">
        <label>名称</label>
        <input id="levelName" type="text" value="Level 1" />
      </div>
      <div class="row">
        <label>Ring缩放</label>
        <input id="ringScale" type="number" value="0.5" min="0.01" step="0.1" />
      </div>

      <h3>全局参数</h3>
      <div class="small">GapSize 固定为 45（与运行时一致）</div>

      <div class="row">
        <button id="addRingBtn">新增 Ring</button>
        <button id="autoSpreadBtn">自动拉开</button>
      </div>

      <div id="overlapStatus" class="warn">重叠检查中...</div>

      <h3>Rings</h3>
      <div id="ringList"></div>

      <h3>岩石</h3>
      <div class="row">
        <select id="rockRingSelect"></select>
        <button id="addRockBtn">新增 Rock</button>
      </div>
      <div id="rockList"></div>

      <h3>炸弹</h3>
      <div class="row">
        <select id="bombRingSelect"></select>
        <input id="bombCountdownInput" type="number" min="1" value="30" title="默认倒计时（秒）" />
        <button id="addBombBtn">新增 Bomb</button>
      </div>
      <div id="bombList"></div>

      <h3>导出</h3>
      <div class="row">
        <button id="exportRepoBtn">导出 LevelConfig 片段（自动复制）</button>
      </div>
      <h3>导入</h3>
      <div class="row">
        <textarea id="importInput" rows="6" placeholder="粘贴 LevelConfig 片段，如：5: { ... }, 或 { ... }"></textarea>
      </div>
      <div class="row">
        <button id="importBtn">导入到编辑器</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="stage"></canvas>
      <div id="canvasHint" class="canvas-hint" aria-live="polite"></div>
      <div class="hint">
        左键点选 / 拖拽移动 | 中键拖拽旋转 Angle | 红色表示与其他 Ring 重叠<br/>
        Angle：0°=缺口朝上（逆时针为正）；导出字段为 `angle`（与 Ring.prefab 默认朝向一致）。Buckle 支持 -135°~135° 任意角度
      </div>
    </div>
  </div>

  <script>
    // 与项目运行时保持一致：
    // Ring.prefab 基准半径 180，运行时缩放由关卡配置控制
    const RING_PREFAB_BASE_RADIUS = 180;
    // 编辑器 angle：0°=缺口朝上（世界角逆时针）；导出 angle 与 Runtime 根节点 Z 旋转一一对应（不做额外偏移）
    // Buckle 连续角度参数（与 Runtime Buckle.ts 保持一致）
    const BUCKLE_LOCAL_RADIUS = 245;
    const BUCKLE_MIN_ANGLE = -135;
    const BUCKLE_MAX_ANGLE = 135;
    // 与 Runtime.ringCenterOffsetX/Y 一致：配置坐标到可视中心的偏移
    const RING_CENTER_OFFSET = { x: 0, y: 20 };
    // 普通环颜色池（排除红色），红色仅用于重叠警示
    const RING_COLORS = ["#4ecdc4", "#5b8cff", "#b06bff", "#ffd166", "#3ddc97", "#7bdff2", "#8bc34a"];
    const RING_STROKE_WIDTH = 24;

    const state = {
      rings: [
        { id: "ring1", position: { x: -140, y: 0 }, angle: 0, buckles: [] },
        { id: "ring2", position: { x: 0, y: 0 }, angle: 0, buckles: [] },
        { id: "ring3", position: { x: 140, y: 0 }, angle: 0, buckles: [] },
      ],
      ringScale: 0.5,
      rocks: [],
      bombs: [],
      dragRingId: null,
      dragOffset: { x: 0, y: 0 },
      selectedRingId: null,
      /** @type {{ ringId: string, lastWorld: { x: number, y: number }, startAngle: number, accumulatedDelta: number } | null} */
      midRotateState: null,
    };

    const el = {
      levelId: document.getElementById("levelId"),
      levelName: document.getElementById("levelName"),
      ringScale: document.getElementById("ringScale"),
      addRingBtn: document.getElementById("addRingBtn"),
      autoSpreadBtn: document.getElementById("autoSpreadBtn"),
      overlapStatus: document.getElementById("overlapStatus"),
      ringList: document.getElementById("ringList"),
      rockRingSelect: document.getElementById("rockRingSelect"),
      addRockBtn: document.getElementById("addRockBtn"),
      rockList: document.getElementById("rockList"),
      bombRingSelect: document.getElementById("bombRingSelect"),
      bombCountdownInput: document.getElementById("bombCountdownInput"),
      addBombBtn: document.getElementById("addBombBtn"),
      bombList: document.getElementById("bombList"),
      exportRepoBtn: document.getElementById("exportRepoBtn"),
      importInput: document.getElementById("importInput"),
      importBtn: document.getElementById("importBtn"),
      stage: document.getElementById("stage"),
      canvasHint: document.getElementById("canvasHint"),
    };

    const ctx = el.stage.getContext("2d");
    const FIXED_GAP_SIZE = 45;
    const MAX_UNDO_STEPS = 100;
    const undoStack = [];
    let dragUndoRecorded = false;
    let rotateUndoRecorded = false;

    function clonePlain(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function getEditableSnapshot() {
      return {
        levelId: String(el.levelId.value),
        levelName: String(el.levelName.value),
        ringScaleInput: String(el.ringScale.value),
        ringScale: Number(state.ringScale),
        rings: clonePlain(state.rings),
        rocks: clonePlain(state.rocks),
        bombs: clonePlain(state.bombs),
      };
    }

    function restoreEditableSnapshot(snapshot) {
      el.levelId.value = snapshot.levelId;
      el.levelName.value = snapshot.levelName;
      el.ringScale.value = snapshot.ringScaleInput;
      state.ringScale = Number(snapshot.ringScale);
      state.rings = clonePlain(snapshot.rings);
      state.rocks = clonePlain(snapshot.rocks);
      state.bombs = clonePlain(snapshot.bombs);
      state.selectedRingId = null;
      state.dragRingId = null;
      state.midRotateState = null;
      refreshEditors();
    }

    function pushUndoSnapshot() {
      const snapshot = getEditableSnapshot();
      const last = undoStack.length > 0 ? undoStack[undoStack.length - 1] : null;
      if (last && JSON.stringify(last) === JSON.stringify(snapshot)) {
        return;
      }
      undoStack.push(snapshot);
      if (undoStack.length > MAX_UNDO_STEPS) {
        undoStack.splice(0, undoStack.length - MAX_UNDO_STEPS);
      }
    }

    function undoLastChange() {
      if (undoStack.length === 0) return;
      const snapshot = undoStack.pop();
      restoreEditableSnapshot(snapshot);
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = el.stage.getBoundingClientRect();
      el.stage.width = Math.floor(rect.width * dpr);
      el.stage.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }
    window.addEventListener("resize", resizeCanvas);

    function worldToCanvas(p) {
      const rect = el.stage.getBoundingClientRect();
      return { x: rect.width * 0.5 + p.x, y: rect.height * 0.5 - p.y };
    }
    function canvasToWorld(p) {
      const rect = el.stage.getBoundingClientRect();
      return { x: p.x - rect.width * 0.5, y: -(p.y - rect.height * 0.5) };
    }

    function getRadius() {
      return RING_PREFAB_BASE_RADIUS * state.ringScale;
    }
    resizeCanvas();

    function normalize(a) {
      const m = a % 360;
      return m < 0 ? m + 360 : m;
    }

    function snapAngleToStep(angle, step) {
      if (!Number.isFinite(angle)) return 0;
      if (!Number.isFinite(step) || step <= 0) {
        throw new Error(`非法角度步进: ${step}`);
      }
      return Math.round(angle / step) * step;
    }

    function overlaps(r1, r2) {
      const c1 = getRenderCenter(r1);
      const c2 = getRenderCenter(r2);
      const dx = c1.x - c2.x;
      const dy = c1.y - c2.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      // 任意两个环边缘接触或相交都视为错误重叠
      return d <= getRadius() * 2;
    }

    function getRenderCenter(ring) {
      // 配置坐标 + Ring 圆心偏移 = 实际可视/判定圆心
      return {
        x: ring.position.x + RING_CENTER_OFFSET.x,
        y: ring.position.y + RING_CENTER_OFFSET.y,
      };
    }

    function overlapPairs() {
      const arr = [];
      for (let i = 0; i < state.rings.length; i++) {
        for (let j = i + 1; j < state.rings.length; j++) {
          if (overlaps(state.rings[i], state.rings[j])) arr.push([state.rings[i].id, state.rings[j].id]);
        }
      }
      return arr;
    }

    /** 从环心指向两点的方向角差（度），逆时针为正（世界 y 向上） */
    function pointerAngleDeltaFromCenter(center, prevWorld, currWorld) {
      const v1 = { x: prevWorld.x - center.x, y: prevWorld.y - center.y };
      const v2 = { x: currWorld.x - center.x, y: currWorld.y - center.y };
      const len1 = Math.hypot(v1.x, v1.y);
      const len2 = Math.hypot(v2.x, v2.y);
      if (len1 < 1e-6 || len2 < 1e-6) return 0;
      const n1 = { x: v1.x / len1, y: v1.y / len1 };
      const n2 = { x: v2.x / len2, y: v2.y / len2 };
      const dot = n1.x * n2.x + n1.y * n2.y;
      const cross = n1.x * n2.y - n1.y * n2.x;
      let ang = Math.acos(Math.max(-1, Math.min(1, dot))) * (180 / Math.PI);
      if (cross < 0) ang = -ang;
      return ang;
    }

    function drawRing(r, color, isOverlap, isSelected) {
      const c = worldToCanvas(getRenderCenter(r));
      // 视觉 ring 仅向内吃线宽，外边界与实际判定半径对齐（border-box）
      const outerRadius = getRadius();
      const rad = Math.max(1, outerRadius - RING_STROKE_WIDTH * 0.5);
      const gapSize = FIXED_GAP_SIZE;
      // 缺口中心方向（世界 y 轴向上、从 +X 逆时针）：编辑器 angle=0 → 90°=朝上
      const gapMid = normalize(r.angle + 90);
      // Canvas arc 角沿顺时针递增；世界坐标（与 Buckle / Rules 一致）为 y 向上、逆时针为正 → 映射为取负。
      // 取负后若仍用 clockwise，会画成短弧（缺口）；须 anticlockwise 才能画原先那道大弧（环身）。
      const a1 = ((gapMid + gapSize / 2) * Math.PI) / 180;
      const a2 = ((gapMid - gapSize / 2) * Math.PI) / 180;
      const start = -a1;
      const end = -a2;

      ctx.lineWidth = RING_STROKE_WIDTH;
      ctx.strokeStyle = isOverlap ? "#ff5f5f" : color;
      ctx.beginPath();
      ctx.arc(c.x, c.y, rad, start, end, true);
      ctx.stroke();

      if (isSelected) {
        ctx.save();
        ctx.setLineDash([6, 6]);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(120, 200, 255, 0.95)";
        ctx.beginPath();
        ctx.arc(c.x, c.y, rad + 18, 0, Math.PI * 2, false);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = "#ddd";
      ctx.font = "12px Arial";
      ctx.fillText(r.id, c.x - 16, c.y + 4);

    }

    function getRingGapWorldPoint(ring) {
      const center = getRenderCenter(ring);
      const outerRadius = getRadius();
      const gapMid = normalize(ring.angle + 90);
      const rad = (gapMid * Math.PI) / 180;
      const dist = Math.max(1, outerRadius - RING_STROKE_WIDTH * 0.5);
      return {
        x: center.x + Math.cos(rad) * dist,
        y: center.y + Math.sin(rad) * dist,
      };
    }

    function render() {
      const rect = el.stage.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      ctx.strokeStyle = "#2a2a2a";
      ctx.beginPath();
      ctx.moveTo(0, rect.height * 0.5);
      ctx.lineTo(rect.width, rect.height * 0.5);
      ctx.moveTo(rect.width * 0.5, 0);
      ctx.lineTo(rect.width * 0.5, rect.height);
      ctx.stroke();

      const pairs = overlapPairs();
      const overlapSet = new Set(pairs.flat());
      drawBombs();
      state.rings.forEach((r, i) => {
        const color = RING_COLORS[i % RING_COLORS.length];
        drawRing(r, color, overlapSet.has(r.id), r.id === state.selectedRingId);
      });
      drawRocks();
      drawBucklesOnTop();

      updateCanvasInteractionHint();

      if (pairs.length > 0) {
        el.overlapStatus.className = "warn";
        el.overlapStatus.textContent = `存在重叠: ${pairs.map(p => `${p[0]}<->${p[1]}`).join(" , ")}`;
      } else {
        el.overlapStatus.className = "ok";
        el.overlapStatus.textContent = "无重叠";
      }
    }

    function drawBucklesOnTop() {
      for (const ring of state.rings) {
        for (const buckle of ring.buckles) {
          drawBuckle(ring, buckle.angle);
        }
      }
    }

    function drawBuckle(ring, buckleAngle) {
      const wp = getBuckleWorldPoint(ring, buckleAngle);
      const p = worldToCanvas(wp);
      const rz = buckleAngle + ring.angle;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((-rz * Math.PI) / 180); // world y-up -> canvas y-down
      ctx.fillStyle = "rgba(242, 242, 242, 0.55)";
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(
        -BUCKLE_RENDER_SIZE.w * 0.5,
        -BUCKLE_RENDER_SIZE.h * 0.5,
        BUCKLE_RENDER_SIZE.w,
        BUCKLE_RENDER_SIZE.h
      );
      ctx.fill();
      ctx.stroke();
      drawBuckleArrow();
      ctx.restore();
    }

    function drawBuckleArrow() {
      const arrowStartY = BUCKLE_RENDER_SIZE.h * 0.22;
      const arrowEndY = -BUCKLE_RENDER_SIZE.h * 0.30;
      const arrowHead = Math.max(6, BUCKLE_RENDER_SIZE.w * 0.22);
      ctx.strokeStyle = "#ff8a00";
      ctx.fillStyle = "#ff8a00";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, arrowStartY);
      ctx.lineTo(0, arrowEndY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, arrowEndY);
      ctx.lineTo(-arrowHead * 0.5, arrowEndY + arrowHead * 0.75);
      ctx.lineTo(arrowHead * 0.5, arrowEndY + arrowHead * 0.75);
      ctx.closePath();
      ctx.fill();
    }

    function drawRocks() {
      for (const rock of state.rocks) {
        const ring = state.rings.find((x) => x.id === rock.ringId);
        if (!ring) {
          throw new Error(`Rock 绑定 ring 不存在: ${rock.ringId}`);
        }
        const c = worldToCanvas(getRingGapWorldPoint(ring));
        ctx.fillStyle = "#1f3b8a";
        ctx.fillRect(c.x - 9, c.y - 9, 18, 18);
        ctx.strokeStyle = "#122458";
        ctx.strokeRect(c.x - 9, c.y - 9, 18, 18);
        ctx.fillStyle = "#dfe7ff";
        ctx.font = "10px Arial";
        ctx.fillText("R", c.x - 3, c.y + 3);
      }
    }

    function drawBombs() {
      for (const bomb of state.bombs) {
        const ring = state.rings.find((x) => x.id === bomb.ringId);
        if (!ring) {
          throw new Error(`Bomb 绑定 ring 不存在: ${bomb.ringId}`);
        }
        const c = worldToCanvas(getRenderCenter(ring));
        ctx.fillStyle = "#b78656";
        ctx.beginPath();
        ctx.arc(c.x, c.y, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#6f4e32";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#fff8ef";
        ctx.font = "12px Arial";
        ctx.fillText("B", c.x - 4, c.y + 4);
      }
    }

    function updateCanvasInteractionHint() {
      const box = el.canvasHint;
      const sid = state.selectedRingId;
      const ring = sid ? state.rings.find(x => x.id === sid) : null;
      if (state.midRotateState && ring) {
        box.textContent = `旋转中 · ${ring.id} · Angle ${Math.round(ring.angle)}°（中键拖拽，松手结束）`;
        box.className = "canvas-hint visible";
        return;
      }
      if (state.dragRingId && ring && state.dragRingId === sid) {
        box.textContent = `移动中 · ${ring.id}（左键拖拽）`;
        box.className = "canvas-hint visible";
        return;
      }
      if (sid && ring) {
        box.textContent = `已选中 ${ring.id} · 左键拖拽移动 · 中键拖拽旋转 Angle`;
        box.className = "canvas-hint visible";
        return;
      }
      box.textContent = "";
      box.className = "canvas-hint";
    }

    function makeRingEditor(r) {
      const box = document.createElement("div");
      box.className = "ring-item";
      box.innerHTML = `
        <div class="row">
          <strong>${r.id}</strong>
          <button data-act="del">删除</button>
        </div>
        <div class="row"><label>X</label><input data-k="x" type="number" value="${r.position.x}"></div>
        <div class="row"><label>Y</label><input data-k="y" type="number" value="${r.position.y}"></div>
        <div class="row"><label>Angle</label><input data-k="angle" type="number" value="${r.angle}" title="0=缺口朝上，逆时针为正；导出为 angle"></div>
        <div class="small">Buckle（范围 -135~135，支持任意角度，关联 Ring 自动推导）</div>
        <div class="row">
          <label>Angle</label>
          <input data-k="buckleAngle" type="number" value="0" min="${BUCKLE_MIN_ANGLE}" max="${BUCKLE_MAX_ANGLE}" step="1">
          <button data-act="addBuckle">添加</button>
        </div>
        <div data-k="buckleList"></div>
      `;

      box.querySelector('[data-k="x"]').addEventListener("input", e => { pushUndoSnapshot(); r.position.x = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-k="y"]').addEventListener("input", e => { pushUndoSnapshot(); r.position.y = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-k="angle"]').addEventListener("input", e => { pushUndoSnapshot(); r.angle = Number(e.target.value) || 0; render(); });
      box.querySelector('[data-act="del"]').addEventListener("click", () => {
        pushUndoSnapshot();
        if (state.selectedRingId === r.id) state.selectedRingId = null;
        state.rings = state.rings.filter(x => x.id !== r.id);
        state.rocks = state.rocks.filter(x => x.ringId !== r.id);
        state.bombs = state.bombs.filter(x => x.ringId !== r.id);
        refreshEditors();
        render();
      });
      box.querySelector('[data-act="addBuckle"]').addEventListener("click", () => {
        pushUndoSnapshot();
        const angleValue = Number(box.querySelector('[data-k="buckleAngle"]').value);
        assertValidBuckleAngle(angleValue);
        r.buckles.push({ angle: angleValue });
        refreshEditors();
      });

      const buckleList = box.querySelector('[data-k="buckleList"]');
      r.buckles.forEach((b, idx) => {
        const item = document.createElement("div");
        item.className = "row";
        item.innerHTML = `
          <span>${b.angle}°</span>
          <button data-rm="${idx}">移除</button>
        `;
        item.querySelector("button").addEventListener("click", () => {
          pushUndoSnapshot();
          r.buckles.splice(idx, 1);
          refreshEditors();
        });
        buckleList.appendChild(item);
      });

      return box;
    }

    // Buckle prefab 视觉尺寸约 104x127，运行时 Ring 使用 0.5 缩放后近似尺寸：
    const BUCKLE_RENDER_SIZE = { w: 52, h: 63.5 };

    function rotateYUp(v, deg) {
      const rad = (deg * Math.PI) / 180;
      const c = Math.cos(rad);
      const s = Math.sin(rad);
      return { x: v.x * c - v.y * s, y: v.x * s + v.y * c };
    }

    function assertValidBuckleAngle(angle) {
      if (!Number.isFinite(angle)) {
        throw new Error(`Buckle angle 非法: ${angle}`);
      }
      if (angle < BUCKLE_MIN_ANGLE || angle > BUCKLE_MAX_ANGLE) {
        throw new Error(`Buckle angle 超出范围(${BUCKLE_MIN_ANGLE}~${BUCKLE_MAX_ANGLE}): ${angle}`);
      }
    }

    function getBuckleLocalPosByAngle(angle) {
      assertValidBuckleAngle(angle);
      const rad = ((angle - 90) * Math.PI) / 180;
      return {
        x: Math.cos(rad) * BUCKLE_LOCAL_RADIUS,
        y: Math.sin(rad) * BUCKLE_LOCAL_RADIUS,
      };
    }

    function getBuckleWorldPoint(ring, buckleAngle) {
      const center = getRenderCenter(ring);
      const lp = getBuckleLocalPosByAngle(buckleAngle);
      const scaled = { x: lp.x * state.ringScale, y: lp.y * state.ringScale };
      const w = rotateYUp(scaled, ring.angle);
      return { x: center.x + w.x, y: center.y + w.y };
    }

    function inferLinkedRingId(sourceRing, buckleAngle) {
      const p = getBuckleWorldPoint(sourceRing, buckleAngle);
      const radius = getRadius();
      let bestId = undefined;
      let bestErr = Number.POSITIVE_INFINITY;

      for (const target of state.rings) {
        if (target.id === sourceRing.id) continue;
        const c = getRenderCenter(target);
        const d = Math.hypot(p.x - c.x, p.y - c.y);
        const err = Math.abs(d - radius);
        if (err < bestErr) {
          bestErr = err;
          bestId = target.id;
        }
      }

      // 容差：离目标环边缘过远则不建立关联
      return bestErr <= 24 ? bestId : undefined;
    }

    function refreshEditors() {
      el.ringList.innerHTML = "";
      state.rings.forEach(r => el.ringList.appendChild(makeRingEditor(r)));
      refreshEntityEditors();
      render();
    }

    function ringOptionsHtml() {
      return state.rings.map((r) => `<option value="${r.id}">${r.id}</option>`).join("");
    }

    function refreshEntityEditors() {
      const options = ringOptionsHtml();
      el.rockRingSelect.innerHTML = options;
      el.bombRingSelect.innerHTML = options;

      el.rockList.innerHTML = "";
      state.rocks.forEach((rock, idx) => {
        const item = document.createElement("div");
        item.className = "entity-item";
        item.innerHTML = `
          <div class="row">
            <span>${rock.id} -> ${rock.ringId}</span>
            <button data-rm="${idx}">删除</button>
          </div>
        `;
        item.querySelector("button").addEventListener("click", () => {
          pushUndoSnapshot();
          state.rocks.splice(idx, 1);
          refreshEditors();
        });
        el.rockList.appendChild(item);
      });

      el.bombList.innerHTML = "";
      state.bombs.forEach((bomb, idx) => {
        const item = document.createElement("div");
        item.className = "entity-item";
        item.innerHTML = `
          <div class="row">
            <span>${bomb.id} -> ${bomb.ringId}</span>
            <button data-rm="${idx}">删除</button>
          </div>
          <div class="row">
            <label>Countdown</label>
            <input data-k="countdown" type="number" min="1" value="${bomb.countdown ?? 30}" />
          </div>
        `;
        item.querySelector("button").addEventListener("click", () => {
          pushUndoSnapshot();
          state.bombs.splice(idx, 1);
          refreshEditors();
        });
        item.querySelector('[data-k="countdown"]').addEventListener("input", (e) => {
          pushUndoSnapshot();
          bomb.countdown = Number(e.target.value);
          render();
        });
        el.bombList.appendChild(item);
      });
    }

    function exportConfigObject() {
      for (const rock of state.rocks) {
        if (!state.rings.find((x) => x.id === rock.ringId)) {
          throw new Error(`导出失败：Rock 绑定 ring 不存在: ${rock.ringId}`);
        }
      }
      for (const bomb of state.bombs) {
        if (!state.rings.find((x) => x.id === bomb.ringId)) {
          throw new Error(`导出失败：Bomb 绑定 ring 不存在: ${bomb.ringId}`);
        }
      }

      const exportedBuckles = [];
      for (const r of state.rings) {
        for (const b of r.buckles) {
          assertValidBuckleAngle(Number(b.angle));
          const linkedRingId = inferLinkedRingId(r, b.angle);
          exportedBuckles.push({
            ringId: r.id,
            angle: b.angle,
            ...(linkedRingId ? { linkedRingId } : {})
          });
        }
      }
      return {
        id: Number(el.levelId.value) || 1,
        name: el.levelName.value || `Level ${el.levelId.value || 1}`,
        ringScale: state.ringScale,
        rings: state.rings.map(r => ({
          id: r.id,
          position: { x: Math.round(r.position.x), y: Math.round(r.position.y) },
          angle: Math.round(r.angle)
        })),
        buckles: exportedBuckles,
        rocks: state.rocks,
        bombs: state.bombs,
      };
    }

    function guardExportWhenOverlap() {
      const pairs = overlapPairs();
      if (pairs.length === 0) return true;
      alert(`导出失败：存在环重叠（含边缘接触）\n${pairs.map(p => `${p[0]} <-> ${p[1]}`).join("\n")}`);
      return false;
    }

    function toTsSingleQuotedString(text) {
      return `'${String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'")}'`;
    }

    function formatInlineObjectArray(items) {
      if (items.length === 0) return "[]";
      return `[${items.map((item) => `{ ${item} }`).join(", ")}]`;
    }

    function formatLevelConfigSnippet(levelKey, cfg) {
      const ringLines = cfg.rings.map((ring) => (
        `      { id: ${toTsSingleQuotedString(ring.id)}, position: { x: ${ring.position.x}, y: ${ring.position.y} }, angle: ${ring.angle} },`
      ));
      const buckleLines = cfg.buckles.map((buckle) => {
        const linkedPart = buckle.linkedRingId
          ? `, linkedRingId: ${toTsSingleQuotedString(buckle.linkedRingId)}`
          : "";
        return `      { ringId: ${toTsSingleQuotedString(buckle.ringId)}, angle: ${buckle.angle}${linkedPart} },`;
      });

      const rocks = formatInlineObjectArray(
        cfg.rocks.map((rock) => `id: ${toTsSingleQuotedString(rock.id)}, ringId: ${toTsSingleQuotedString(rock.ringId)}`)
      );
      const bombs = formatInlineObjectArray(
        cfg.bombs.map((bomb) => {
          if (typeof bomb.countdown === "number") {
            return `id: ${toTsSingleQuotedString(bomb.id)}, ringId: ${toTsSingleQuotedString(bomb.ringId)}, countdown: ${bomb.countdown}`;
          }
          return `id: ${toTsSingleQuotedString(bomb.id)}, ringId: ${toTsSingleQuotedString(bomb.ringId)}`;
        })
      );

      return [
        `  ${levelKey}: {`,
        `    name: ${toTsSingleQuotedString(cfg.name)},`,
        `    ringScale: ${cfg.ringScale},`,
        `    rings: [`,
        ...ringLines,
        `    ],`,
        `    buckles: [`,
        ...buckleLines,
        `    ],`,
        `    rocks: ${rocks},`,
        `    bombs: ${bombs},`,
        `  },`,
      ].join("\n");
    }

    function exportRepoSnippet() {
      const cfg = exportConfigObject();
      const levelKey = Math.max(1, Math.round(Number(el.levelId.value) || 1));
      return formatLevelConfigSnippet(levelKey, cfg);
    }

    function normalizeImportText(rawText) {
      const text = String(rawText || "").trim();
      if (!text) {
        throw new Error("导入失败：请输入配置文本");
      }
      if (text.startsWith("return ")) {
        return text.replace(/^return\s+/, "").replace(/;$/, "").trim();
      }
      const keyedMatch = text.match(/^\s*\d+\s*:\s*\{[\s\S]*\}\s*,?\s*$/);
      if (keyedMatch) {
        const wrapped = `{${text.replace(/,\s*$/, "")}}`;
        return `(${wrapped})`;
      }
      return text;
    }

    function parseImportConfig(rawText) {
      const source = normalizeImportText(rawText);
      let parsed;
      try {
        parsed = Function(`"use strict"; return (${source});`)();
      } catch (err) {
        throw new Error(`导入失败：配置语法错误（${err?.message || String(err)}）`);
      }

      if (parsed && typeof parsed === "object" && !Array.isArray(parsed) && Array.isArray(parsed.rings)) {
        return parsed;
      }

      if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
        const keys = Object.keys(parsed);
        if (keys.length === 1 && /^\d+$/.test(keys[0])) {
          return parsed[keys[0]];
        }
      }
      throw new Error("导入失败：无法识别关卡对象");
    }

    function validateImportedConfig(cfg) {
      if (!cfg || typeof cfg !== "object") throw new Error("导入失败：配置不是对象");
      if (typeof cfg.name !== "string" || !cfg.name.trim()) throw new Error("导入失败：name 非法");
      if (!Number.isFinite(Number(cfg.ringScale)) || Number(cfg.ringScale) <= 0) {
        throw new Error("导入失败：ringScale 非法");
      }
      if (!Array.isArray(cfg.rings) || cfg.rings.length === 0) throw new Error("导入失败：rings 不能为空");
      if (!Array.isArray(cfg.buckles)) throw new Error("导入失败：buckles 必须是数组");
      if (!Array.isArray(cfg.rocks)) throw new Error("导入失败：rocks 必须是数组");
      if (!Array.isArray(cfg.bombs)) throw new Error("导入失败：bombs 必须是数组");
    }

    function importConfigToState(cfg) {
      validateImportedConfig(cfg);
      const rings = cfg.rings.map((ring) => {
        if (!ring || typeof ring !== "object") throw new Error("导入失败：ring 条目非法");
        if (typeof ring.id !== "string" || !ring.id) throw new Error("导入失败：ring.id 非法");
        if (!ring.position || !Number.isFinite(Number(ring.position.x)) || !Number.isFinite(Number(ring.position.y))) {
          throw new Error(`导入失败：ring.position 非法: ${ring.id}`);
        }
        if (!Number.isFinite(Number(ring.angle))) throw new Error(`导入失败：ring.angle 非法: ${ring.id}`);
        return {
          id: ring.id,
          position: { x: Number(ring.position.x), y: Number(ring.position.y) },
          angle: Number(ring.angle),
          buckles: [],
        };
      });
      const ringIds = new Set(rings.map((x) => x.id));

      for (const buckle of cfg.buckles) {
        if (!buckle || typeof buckle !== "object") throw new Error("导入失败：buckle 条目非法");
        if (typeof buckle.ringId !== "string" || !ringIds.has(buckle.ringId)) {
          throw new Error(`导入失败：buckle.ringId 非法: ${buckle?.ringId}`);
        }
        if (!Number.isFinite(Number(buckle.angle))) throw new Error(`导入失败：buckle.angle 非法: ${buckle.ringId}`);
        assertValidBuckleAngle(Number(buckle.angle));
        const ring = rings.find((x) => x.id === buckle.ringId);
        if (!ring) throw new Error(`导入失败：找不到 buckle 绑定 ring: ${buckle.ringId}`);
        ring.buckles.push({ angle: Number(buckle.angle) });
      }

      const rocks = cfg.rocks.map((rock) => {
        if (!rock || typeof rock !== "object") throw new Error("导入失败：rock 条目非法");
        if (typeof rock.id !== "string" || !rock.id) throw new Error("导入失败：rock.id 非法");
        if (typeof rock.ringId !== "string" || !ringIds.has(rock.ringId)) {
          throw new Error(`导入失败：rock.ringId 非法: ${rock?.ringId}`);
        }
        return { id: rock.id, ringId: rock.ringId };
      });

      const bombs = cfg.bombs.map((bomb) => {
        if (!bomb || typeof bomb !== "object") throw new Error("导入失败：bomb 条目非法");
        if (typeof bomb.id !== "string" || !bomb.id) throw new Error("导入失败：bomb.id 非法");
        if (typeof bomb.ringId !== "string" || !ringIds.has(bomb.ringId)) {
          throw new Error(`导入失败：bomb.ringId 非法: ${bomb?.ringId}`);
        }
        const countdown = bomb.countdown == null ? 30 : Number(bomb.countdown);
        if (!Number.isFinite(countdown) || countdown <= 0) {
          throw new Error(`导入失败：bomb.countdown 非法: ${bomb.id}`);
        }
        return { id: bomb.id, ringId: bomb.ringId, countdown: Math.round(countdown) };
      });

      el.levelName.value = String(cfg.name);
      el.ringScale.value = String(Number(cfg.ringScale));
      state.ringScale = Number(cfg.ringScale);
      state.rings = rings;
      state.rocks = rocks;
      state.bombs = bombs;
      state.selectedRingId = null;
      state.dragRingId = null;
      state.midRotateState = null;
      refreshEditors();
    }

    function copyTextFallback(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "readonly");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      if (!ok) throw new Error("浏览器拒绝复制");
    }

    async function copyExportSnippetToClipboard() {
      if (!guardExportWhenOverlap()) return false;
      const text = exportRepoSnippet();
      if (location.protocol === "file:") {
        copyTextFallback(text);
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        copyTextFallback(text);
      }
      return true;
    }

    function autoSpread() {
      pushUndoSnapshot();
      const r = getRadius();
      const n = Math.max(state.rings.length, 1);
      const R = Math.max(180, r * 1.8);
      state.rings.forEach((ring, i) => {
        const a = (i / n) * Math.PI * 2;
        ring.position.x = Math.round(Math.cos(a) * R);
        ring.position.y = Math.round(Math.sin(a) * R);
      });
      refreshEditors();
    }

    el.addRingBtn.addEventListener("click", () => {
      pushUndoSnapshot();
      const idx = state.rings.length + 1;
      state.rings.push({
        id: `ring${idx}`,
        position: { x: idx * 40, y: 0 },
        angle: 0,
        buckles: []
      });
      refreshEditors();
    });
    el.autoSpreadBtn.addEventListener("click", autoSpread);

    el.addRockBtn.addEventListener("click", () => {
      pushUndoSnapshot();
      const ringId = el.rockRingSelect.value;
      if (!state.rings.find((x) => x.id === ringId)) {
        throw new Error(`新增 Rock 失败：ring 不存在: ${ringId}`);
      }
      if (state.rocks.find((x) => x.ringId === ringId)) {
        throw new Error(`新增 Rock 失败：ring 已有 Rock: ${ringId}`);
      }
      const id = `rock${state.rocks.length + 1}`;
      state.rocks.push({ id, ringId });
      refreshEditors();
    });

    el.addBombBtn.addEventListener("click", () => {
      pushUndoSnapshot();
      const ringId = el.bombRingSelect.value;
      if (!state.rings.find((x) => x.id === ringId)) {
        throw new Error(`新增 Bomb 失败：ring 不存在: ${ringId}`);
      }
      if (state.bombs.find((x) => x.ringId === ringId)) {
        throw new Error(`新增 Bomb 失败：ring 已有 Bomb: ${ringId}`);
      }
      const countdown = Number(el.bombCountdownInput.value);
      if (!Number.isFinite(countdown) || countdown <= 0) {
        throw new Error(`新增 Bomb 失败：countdown 非法: ${el.bombCountdownInput.value}`);
      }
      const id = `bomb${state.bombs.length + 1}`;
      state.bombs.push({ id, ringId, countdown: Math.round(countdown) });
      refreshEditors();
    });

    el.exportRepoBtn.addEventListener("click", async () => {
      try {
        const ok = await copyExportSnippetToClipboard();
        if (!ok) return;
      } catch (err) {
        alert(`复制失败: ${err?.message || String(err)}`);
        return;
      }
      alert("已复制 LevelConfig 片段到剪贴板");
    });

    el.importBtn.addEventListener("click", () => {
      try {
        pushUndoSnapshot();
        const cfg = parseImportConfig(el.importInput.value);
        importConfigToState(cfg);
      } catch (err) {
        alert(err?.message || String(err));
        return;
      }
      alert("导入成功");
    });

    el.ringScale.addEventListener("change", (e) => {
      pushUndoSnapshot();
      const value = Number(e.target.value);
      if (!Number.isFinite(value) || value <= 0) {
        throw new Error(`非法缩放值: ${e.target.value}`);
      }
      state.ringScale = value;
      render();
    });

    function pickRingAtWorld(p) {
      const rad = getRadius();
      for (let i = state.rings.length - 1; i >= 0; i--) {
        const ring = state.rings[i];
        const center = getRenderCenter(ring);
        const dx = p.x - center.x;
        const dy = p.y - center.y;
        if (Math.hypot(dx, dy) <= rad) return ring;
      }
      return null;
    }

    el.stage.addEventListener("mousedown", (e) => {
      const rect = el.stage.getBoundingClientRect();
      const p = canvasToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });

      if (e.button === 1) {
        e.preventDefault();
        const ring = pickRingAtWorld(p);
        if (!ring) return;
        if (!rotateUndoRecorded) {
          pushUndoSnapshot();
          rotateUndoRecorded = true;
        }
        state.selectedRingId = ring.id;
        const center = getRenderCenter(ring);
        state.midRotateState = {
          ringId: ring.id,
          lastWorld: { x: p.x, y: p.y },
          startAngle: ring.angle,
          accumulatedDelta: 0,
        };
        render();
        return;
      }

      if (e.button !== 0) return;

      const ring = pickRingAtWorld(p);
      if (!ring) {
        state.selectedRingId = null;
        render();
        return;
      }

      state.selectedRingId = ring.id;
      if (!dragUndoRecorded) {
        pushUndoSnapshot();
        dragUndoRecorded = true;
      }
      const center = getRenderCenter(ring);
      state.dragRingId = ring.id;
      state.dragOffset.x = center.x - p.x;
      state.dragOffset.y = center.y - p.y;
      render();
    });

    el.stage.addEventListener("auxclick", (e) => {
      if (e.button === 1) e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      const rect = el.stage.getBoundingClientRect();
      const p = canvasToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });

      if (state.midRotateState) {
        const ring = state.rings.find(x => x.id === state.midRotateState.ringId);
        if (!ring) {
          state.midRotateState = null;
          render();
          return;
        }
        const center = getRenderCenter(ring);
        const d = pointerAngleDeltaFromCenter(center, state.midRotateState.lastWorld, p);
        state.midRotateState.accumulatedDelta += d;
        ring.angle = snapAngleToStep(
          state.midRotateState.startAngle + state.midRotateState.accumulatedDelta,
          45
        );
        state.midRotateState.lastWorld = { x: p.x, y: p.y };
        refreshEditors();
        return;
      }

      if (!state.dragRingId) return;
      const ring = state.rings.find(x => x.id === state.dragRingId);
      if (!ring) return;
      const newCenterX = p.x + state.dragOffset.x;
      const newCenterY = p.y + state.dragOffset.y;
      ring.position.x = Math.round(newCenterX - RING_CENTER_OFFSET.x);
      ring.position.y = Math.round(newCenterY - RING_CENTER_OFFSET.y);
      refreshEditors();
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button === 1 && state.midRotateState) {
        state.midRotateState = null;
        rotateUndoRecorded = false;
        render();
      }
      if (e.button === 0) {
        state.dragRingId = null;
        dragUndoRecorded = false;
        render();
      }
    });

    window.addEventListener("keydown", async (e) => {
      if (!e.ctrlKey) return;
      const key = String(e.key || "").toLowerCase();
      if (key === "z") {
        e.preventDefault();
        undoLastChange();
        return;
      }
      if (key === "s") {
        e.preventDefault();
        try {
          const ok = await copyExportSnippetToClipboard();
          if (ok) {
            alert("已复制 LevelConfig 片段到剪贴板");
          }
        } catch (err) {
          alert(`复制失败: ${err?.message || String(err)}`);
        }
      }
    });

    refreshEditors();
  </script>
</body>
</html>
